services:
  db:
    image: postgres:15-alpine
    container_name: db
    environment:
      # All credentials pulled from root .env
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: backend
    # DEV:  BACKEND_COMMAND=python manage.py runserver 0.0.0.0:8000
    # PROD: BACKEND_COMMAND=gunicorn ecom_project.wsgi:application --bind 0.0.0.0:8000 --workers 3
    command: sh -c "${BACKEND_COMMAND}"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - db
    restart: always

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL}
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
      - "5174:5174"
    volumes:
      - media_volume:/app/media
      - ./certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - backend
    restart: always

volumes:
  static_volume:
  media_volume:
  postgres_data:
