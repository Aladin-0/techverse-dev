services:
  db:
    image: postgres:15-alpine
    container_name: db
    environment:
      # All credentials pulled from root .env
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: backend
    # DEV:  BACKEND_COMMAND=python manage.py runserver 0.0.0.0:8000
    # PROD: BACKEND_COMMAND=gunicorn ecom_project.wsgi:application --bind 0.0.0.0:8000 --workers 3
    command: sh -c "${BACKEND_COMMAND}"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - db
    restart: always

  frontend:
    image: node:20-alpine
    container_name: frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./techversefrontend:/app
    env_file:
      - .env
    environment:
      # Vite requires VITE_ prefix — pass from root .env
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    ports:
      - "5173:5173"
    restart: always

  admin-react:
    image: node:20-alpine
    container_name: admin-react
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./admin-react:/app
    env_file:
      - .env
    environment:
      # Vite requires VITE_ prefix — pass from root .env
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    ports:
      - "5174:5174"
    restart: always

volumes:
  static_volume:
  media_volume:
  postgres_data:
