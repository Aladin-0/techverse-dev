services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: backend
    command: gunicorn ecom_project.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - static_volume:/app/staticfiles
      - ts-production_media_volume:/app/media
    env_file:
      - .env
    expose:
      - "8000"
    restart: always
    networks:
      - techverse_default
      - ts_network

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: nginx
    restart: always
    volumes:
      - static_volume:/app/staticfiles
      - ts-production_media_volume:/app/media
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    ports:
      - "8081:80"
    depends_on:
      - backend
    networks:
      - techverse_default

  certbot:
    image: certbot/certbot
    container_name: certbot_techverse
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - techverse_default

networks:
  techverse_default:
    driver: bridge
  ts_network:
    external: true
    name: ts-production_default

volumes:
  static_volume:
  ts-production_media_volume:
    external: true
  ts-production_postgres_data:
    external: true
