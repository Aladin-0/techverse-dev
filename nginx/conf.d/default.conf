# /nginx/conf.d/default.conf
# Production-hardened Nginx — Admin panel now served at /admin/ on port 443

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

# HTTP catch-all: Redirect everything to HTTPS
server {
    listen 80 default_server;
    server_name techverseservices.in www.techverseservices.in;
    return 301 https://techverseservices.in$request_uri;
}

# HTTPS — Main Site + Admin Panel (both on port 443)
server {
    client_max_body_size 20M;
    listen 443 ssl;
    server_name techverseservices.in www.techverseservices.in;

    ssl_certificate /etc/letsencrypt/live/techverseservices.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/techverseservices.in/privkey.pem;

    # SSL Hardening
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    root /usr/share/nginx/html;
    index index.html index.htm;
    absolute_redirect off;

    # ── Security Headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Media Files ──────────────────────────────────────────────────────────
    location /media/ {
        alias /app/media/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # ── Django Admin — IP-restricted ─────────────────────────────────────────
    location /django-admin/ {
        allow 127.0.0.1;
        allow 182.70.63.4;
        deny all;

        limit_req zone=login burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://backend:8000/django-admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Auth Endpoints — rate-limited ─────────────────────────────────────────
    location /auth/ {
        limit_req zone=login burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /accounts/ {
        limit_req zone=login burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # ── API Proxy ─────────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=30 nodelay;
        limit_req_status 429;

        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /services/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://backend:8000/services/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    # ── Admin Panel API (Django backend) ─────────────────────────────────────
    # NOTE: This proxies /admin-panel/ API calls to Django, NOT the React UI
    location /admin-panel/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://backend:8000/admin-panel/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # ── React Admin Panel UI — served at /admin/ ──────────────────────────────
    # Accessible from any device/IP — authenticated by login (email + password)
    location /admin/ {
        alias /usr/share/nginx/admin/;
        index index.html;
        # Sub-path SPA fallback — all routes inside /admin/* load index.html
        try_files $uri $uri/ /admin/index.html;
    }

    # ── Static Assets (main frontend) ────────────────────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Main React App (storefront) ────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
