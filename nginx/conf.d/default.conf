# /nginx/conf.d/default.conf

# HTTP catch-all: Redirect to HTTPS
server {
    listen 80 default_server;
    server_name techverseservices.in www.techverseservices.in;
    return 301 https://techverseservices.in$request_uri;
}

# HTTPS Main Site (techverseservices.in)
server {
    client_max_body_size 50M;
    listen 443 ssl;
    server_name techverseservices.in www.techverseservices.in;

    ssl_certificate /etc/letsencrypt/live/techverseservices.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/techverseservices.in/privkey.pem;

    # SSL optimization
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html index.htm;
    absolute_redirect off;

    location /media/ {
        alias /app/media/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # API Proxy Rules
    location /auth/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /accounts/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /services/ {
        proxy_pass http://backend:8000/services/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /admin-panel/ {
        proxy_pass http://backend:8000/admin-panel/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /django-admin/ {
        proxy_pass http://backend:8000/django-admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /assets/ {
        try_files $uri =404;
    }

    # React App
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# HTTPS Admin Panel (Port 5174)
server {
    client_max_body_size 50M;
    listen 5174 ssl;
    server_name techverseservices.in www.techverseservices.in;

    ssl_certificate /etc/letsencrypt/live/techverseservices.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/techverseservices.in/privkey.pem;

    root /usr/share/nginx/admin;
    index index.html index.htm;

    # The admin app also requests /admin-panel/ and /media/ directly from port 5174 in dev
    # We must proxy these api request paths back to Django so the built admin app still connects.
    location /admin-panel/ {
        proxy_pass http://backend:8000/admin-panel/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /media/ {
        alias /app/media/;
    }

    location /assets/ {
        try_files $uri =404;
    }

    # Admin React frontend
    location / {
        try_files $uri $uri/ /index.html;
    }
}
