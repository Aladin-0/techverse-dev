upstream backend {
    server backend:8000;
}

server {
    listen 80;
    server_name techverseservices.in www.techverseservices.in 182.70.63.4;

    client_max_body_size 100M;

    # ── Gzip Compression ────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml application/json
        application/javascript application/rss+xml application/atom+xml
        image/svg+xml;

    # ── Security Headers ─────────────────────────────────────────────────────
    add_header X-Content-Type-Options   "nosniff"         always;
    add_header X-Frame-Options          "SAMEORIGIN"      always;
    add_header X-XSS-Protection         "1; mode=block"   always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

    # ── Let's Encrypt / Certbot challenge ────────────────────────────────────
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── Django Static Files ──────────────────────────────────────────────────
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Django Media Files ───────────────────────────────────────────────────
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── Django Admin ─────────────────────────────────────────────────────────
    location /admin/ {
        proxy_pass http://backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }

    # ── Custom Admin Panel ───────────────────────────────────────────────────
    location /admin-panel/ {
        proxy_pass http://backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }

    # ── API ──────────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }

    # ── Auth (Google OAuth etc.) ─────────────────────────────────────────────
    location /auth/ {
        proxy_pass http://backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }

    # ── Allauth Accounts ─────────────────────────────────────────────────────
    location /accounts/ {
        proxy_pass http://backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }

    # ── React Frontend (SPA — catch-all) ─────────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;

        # HTML: no cache (always fetch latest)
        location ~* \.html$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
        }

        # Hashed JS/CSS/assets: cache forever (Vite adds hash to filenames)
        location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|jpg|jpeg|gif|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
